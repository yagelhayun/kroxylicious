      CLUSTER_ID: "Qm9yT1pKcW1XU1ZxN2pQZA"

  # ── Kroxylicious Primary ────────────────────────────────────────────────────

  kroxy-primary:
    image: quay.io/kroxylicious/kroxylicious:0.19.0
    ports:
      - "9192:9192"
      - "9190:9190"   # management: http://localhost:9190/livez  http://localhost:9190/metrics
    volumes:
      - ./kroxy-primary.yaml:/config/config.yaml
      - ./acl-rules.txt:/config/acl-rules.txt:ro
      - certs:/certs
    command: ["--config", "/config/config.yaml"]
    # environment:
    #   KROXYLICIOUS_ROOT_LOG_LEVEL: "DEBUG"
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      kafka-primary-0:
        condition: service_started
      kafka-primary-1:
        condition: service_started
      kafka-primary-2:
        condition: service_started
    networks:
      default:
        aliases:
          - bootstrap.primary.local
          - broker-0.primary.local
          - broker-1.primary.local
          - broker-2.primary.local

  # ── Kroxylicious DR ─────────────────────────────────────────────────────────

  kroxy-dr:
    image: quay.io/kroxylicious/kroxylicious:0.19.0
    ports:
      - "9292:9292"
      - "9191:9190"   # management: http://localhost:9191/livez  http://localhost:9191/metrics
    volumes:
      - ./kroxy-dr.yaml:/config/config.yaml
      - ./acl-rules.txt:/config/acl-rules.txt:ro
      - certs:/certs
    command: ["--config", "/config/config.yaml"]
    # environment:
    #   KROXYLICIOUS_ROOT_LOG_LEVEL: "DEBUG"
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      kafka-dr-0:
        condition: service_started
      kafka-dr-1:
        condition: service_started
      kafka-dr-2:
        condition: service_started
    networks:
      default:
        aliases:
          - bootstrap.dr.local
          - broker-0.dr.local
          - broker-1.dr.local
          - broker-2.dr.local

  # ── Kafka UI ────────────────────────────────────────────────────────────────

  kafka-ui-primary:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    volumes:
      - certs:/certs
    environment:
      KAFKA_CLUSTERS_0_NAME: primary-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: bootstrap.primary.local:9192
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SSL
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_LOCATION: /certs/kafka-ui.keystore.p12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_PASSWORD: changeit
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /certs/ca.truststore.p12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_TYPE: PKCS12
    depends_on:
      - kroxy-primary

  kafka-ui-dr:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    volumes:
      - certs:/certs
    environment:
      KAFKA_CLUSTERS_0_NAME: dr-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: bootstrap.dr.local:9292
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SSL
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_LOCATION: /certs/kafka-ui.keystore.p12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_PASSWORD: changeit
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /certs/ca.truststore.p12
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_TYPE: PKCS12
    depends_on:
      - kroxy-dr

volumes:
  certs:
  kafka-primary-0-data:
  kafka-primary-1-data:
  kafka-primary-2-data:
  kafka-dr-0-data:
  kafka-dr-1-data:
  kafka-dr-2-data:
