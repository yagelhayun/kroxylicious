version: '3.8'

services:
  kafka-primary:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-primary
    hostname: kafka-primary
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-primary:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-primary:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-primary-data:/var/lib/kafka/data

  kafka-ui-primary:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: primary-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kroxy-primary:9192

  kafka-dr:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-dr
    hostname: kafka-dr
    ports:
      - "9094:9092"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-dr:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-dr:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "Qm9yT1pKcW1XU1ZxN2pQZA"
    volumes:
      - kafka-dr-data:/var/lib/kafka/data

  kafka-ui-dr:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: dr-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kroxy-dr:9292

  kroxy-primary:
    image: quay.io/kroxylicious/kroxylicious:0.18.0
    ports:
      - "9192:9192"
    volumes:
      - ./kroxy-primary.yaml:/config/config.yaml
    command: ["--config", "/config/config.yaml"]
    # environment:
    #   KROXYLICIOUS_ROOT_LOG_LEVEL: "DEBUG"
    depends_on:
      - kafka-primary

  kroxy-dr:
    image: quay.io/kroxylicious/kroxylicious:0.18.0
    ports:
      - "9292:9292"
    volumes:
      - ./kroxy-dr.yaml:/config/config.yaml
    command: ["--config", "/config/config.yaml"]
    # environment:
    #   KROXYLICIOUS_ROOT_LOG_LEVEL: "DEBUG"
    depends_on:
      - kafka-dr

volumes:
  kafka-primary-data:
  kafka-dr-data:
