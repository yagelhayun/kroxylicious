services:

  # ── Certificate generator ────────────────────────────────────────────────────
  # Runs once on first `docker compose up` and exits.
  # All other services wait for it via `condition: service_completed_successfully`.
  # To force regeneration: docker compose run --rm -e FORCE_REGEN=1 cert-generator
  cert-generator:
    image: eclipse-temurin:17-jre-alpine
    restart: "no"
    volumes:
      - certs:/certs
    command:
      - sh
      - -c
      - |
        apk add --no-cache openssl >/dev/null 2>&1

        if [ -f /certs/.done ] && [ -z "$${FORCE_REGEN:-}" ]; then
          echo "Certificates already present, skipping generation."
          exit 0
        fi

        # Remove any partial files left by a previously failed run
        find /certs -mindepth 1 -delete 2>/dev/null || true

        set -eu
        PASSWORD="changeit"
        DAYS=3650

        echo "[1/7] Generating CA..."
        openssl genrsa -out /certs/ca.key 4096 2>/dev/null
        openssl req -new -x509 -days "$$DAYS" -key /certs/ca.key \
          -out /certs/ca.crt -subj "/CN=LocalTestCA/O=Test/C=IL"

        echo "[2/7] Creating shared PKCS12 truststore (used by Kafka brokers and Kafka-UI)..."
        rm -f /certs/ca.truststore.p12
        keytool -importcert -noprompt -trustcacerts \
          -alias ca -file /certs/ca.crt \
          -keystore /certs/ca.truststore.p12 \
          -storetype PKCS12 -storepass "$$PASSWORD" 2>/dev/null
        printf '%s' "$$PASSWORD" > /certs/ssl_credentials

        # gen_pkcs12 <name> <cn> <san>
        # Produces /certs/<name>.keystore.p12  (for Java services: Kafka brokers, kafka-ui)
        gen_pkcs12() {
          local name cn san tmpdir
          name=$$1; cn=$$2; san=$$3
          tmpdir=$$(mktemp -d)
          printf '[SAN]\nsubjectAltName=%s\n' "$$san" > "$$tmpdir/ext.cnf"
          openssl genrsa -out "$$tmpdir/key.pem" 2048 2>/dev/null
          openssl req -new -key "$$tmpdir/key.pem" -out "$$tmpdir/csr.pem" \
            -subj "/CN=$$cn/O=Test/C=IL"
          openssl x509 -req -days "$$DAYS" \
            -in "$$tmpdir/csr.pem" -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
            -out "$$tmpdir/cert.pem" -extensions SAN -extfile "$$tmpdir/ext.cnf" 2>/dev/null
          openssl pkcs12 -export \
            -in "$$tmpdir/cert.pem" -inkey "$$tmpdir/key.pem" -certfile /certs/ca.crt \
            -name "$$cn" -out "/certs/$${name}.keystore.p12" -passout "pass:$$PASSWORD"
          rm -rf "$$tmpdir"
        }

        # gen_pem <name> <cn> <san>
        # Produces /certs/<name>.key.pem and /certs/<name>.cert.pem  (for Kroxylicious)
        gen_pem() {
          local name cn san tmpdir
          name=$$1; cn=$$2; san=$$3
          tmpdir=$$(mktemp -d)
          printf '[SAN]\nsubjectAltName=%s\n' "$$san" > "$$tmpdir/ext.cnf"
          openssl genrsa -out "/certs/$${name}.key.pem" 2048 2>/dev/null
          openssl req -new -key "/certs/$${name}.key.pem" -out "$$tmpdir/csr.pem" \
            -subj "/CN=$$cn/O=Test/C=IL"
          openssl x509 -req -days "$$DAYS" \
            -in "$$tmpdir/csr.pem" -CA /certs/ca.crt -CAkey /certs/ca.key -CAcreateserial \
            -out "/certs/$${name}.cert.pem" -extensions SAN -extfile "$$tmpdir/ext.cnf" 2>/dev/null
          rm -rf "$$tmpdir"
        }

        echo "[3/7] Generating Kafka Primary broker keystores (PKCS12)..."
        gen_pkcs12 "kafka-primary-0" "kafka-primary-0" "DNS:kafka-primary-0"
        gen_pkcs12 "kafka-primary-1" "kafka-primary-1" "DNS:kafka-primary-1"
        gen_pkcs12 "kafka-primary-2" "kafka-primary-2" "DNS:kafka-primary-2"

        echo "[4/7] Generating Kafka DR broker keystores (PKCS12)..."
        gen_pkcs12 "kafka-dr-0" "kafka-dr-0" "DNS:kafka-dr-0"
        gen_pkcs12 "kafka-dr-1" "kafka-dr-1" "DNS:kafka-dr-1"
        gen_pkcs12 "kafka-dr-2" "kafka-dr-2" "DNS:kafka-dr-2"

        echo "[5/7] Generating Kroxylicious Primary certs (PEM)..."
        gen_pem "kroxy-primary-upstream"   "kroxy-primary-upstream"   "DNS:kroxy-primary"
        gen_pem "kroxy-primary-downstream" "bootstrap.primary.local" \
          "DNS:bootstrap.primary.local,DNS:broker-0.primary.local,DNS:broker-1.primary.local,DNS:broker-2.primary.local"

        echo "[6/7] Generating Kroxylicious DR certs (PEM)..."
        gen_pem "kroxy-dr-upstream"   "kroxy-dr-upstream"   "DNS:kroxy-dr"
        gen_pem "kroxy-dr-downstream" "bootstrap.dr.local" \
          "DNS:bootstrap.dr.local,DNS:broker-0.dr.local,DNS:broker-1.dr.local,DNS:broker-2.dr.local"

        echo "[7/7] Generating Kafka UI keystore (PKCS12)..."
        gen_pkcs12 "kafka-ui" "kafka-ui" "DNS:kafka-ui-primary,DNS:kafka-ui-dr"

        # Make all cert material readable by non-root container users (e.g. Kroxylicious uid 1000).
        # Private keys are only inside a Docker volume so 644 is acceptable here.
        chmod 644 /certs/*

        # Sentinel written only after full successful generation.
        # Its absence on next startup triggers a clean regeneration.
        touch /certs/.done
        echo "Done."

  # ── Kafka Primary — 3-broker KRaft cluster (mTLS) ───────────────────────────

  kafka-primary-0:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-primary-0
    hostname: kafka-primary-0
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    volumes:
      - certs:/etc/kafka/secrets
      - kafka-primary-0-data:/var/lib/kafka/data
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "0"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-primary-0:9094,1@kafka-primary-1:9094,2@kafka-primary-2:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SSL:SSL,CONTROLLER:PLAINTEXT"
      KAFKA_LISTENERS: "SSL://:9093,CONTROLLER://:9094"
      KAFKA_ADVERTISED_LISTENERS: "SSL://kafka-primary-0:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "SSL"
      KAFKA_SSL_KEYSTORE_FILENAME: "kafka-primary-0.keystore.p12"
      KAFKA_SSL_KEYSTORE_TYPE: "PKCS12"
      KAFKA_SSL_KEYSTORE_CREDENTIALS: "ssl_credentials"
      KAFKA_SSL_KEY_CREDENTIALS: "ssl_credentials"
      KAFKA_SSL_TRUSTSTORE_FILENAME: "ca.truststore.p12"
      KAFKA_SSL_TRUSTSTORE_TYPE: "PKCS12"
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: "ssl_credentials"
      KAFKA_SSL_CLIENT_AUTH: "required"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

