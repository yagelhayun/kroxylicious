      KAFKA_SSL_KEYSTORE_CREDENTIALS: "ssl_credentials"
      KAFKA_SSL_KEY_CREDENTIALS: "ssl_credentials"
      KAFKA_SSL_TRUSTSTORE_FILENAME: "ca.truststore.p12"
      KAFKA_SSL_TRUSTSTORE_TYPE: "PKCS12"
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: "ssl_credentials"
      KAFKA_SSL_CLIENT_AUTH: "required"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  # ── Kafka DR — 3-broker KRaft cluster (mTLS) ────────────────────────────────

  kafka-dr-0:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-dr-0
    hostname: kafka-dr-0
    depends_on:
      cert-generator:
        condition: service_completed_successfully
    volumes:
      - certs:/etc/kafka/secrets
      - kafka-dr-0-data:/var/lib/kafka/data
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "0"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-dr-0:9094,1@kafka-dr-1:9094,2@kafka-dr-2:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
