      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka-dr-0:9094,1@kafka-dr-1:9094,2@kafka-dr-2:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
