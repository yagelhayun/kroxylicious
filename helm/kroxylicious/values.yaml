replicaCount: 1

image:
  repository: quay.io/kroxylicious/kroxylicious
  tag: "0.19.0"
  pullPolicy: IfNotPresent

# Name exposed to Kafka clients (appears in metadata responses)
virtualClusterName: my-cluster

# ── Upstream: real Kafka cluster ──────────────────────────────────────────────
targetCluster:
  bootstrapServers: "kafka-0:9093,kafka-1:9093,kafka-2:9093"
  tls:
    # Name of an existing Secret containing the upstream mTLS material.
    # The proxy presents this certificate to the Kafka brokers.
    secretName: kroxylicious-upstream-tls
    keyFile:  tls.key   # private key PEM
    certFile: tls.crt   # certificate PEM

# ── Gateway: how clients connect to this proxy ───────────────────────────────
gateway:
  # External hostname for the bootstrap address.
  # Must resolve to the LoadBalancer IP via DNS.
  bootstrapHost: bootstrap.example.com

  # Port exposed by the LoadBalancer Service and listened on inside the container.
  # With sniHostIdentifiesNode all brokers share this single port.
  port: 9192

  # Per-broker advertised hostname pattern.
  # $(nodeId) is substituted by Kroxylicious at runtime with the broker's node id.
  # All resulting hostnames (broker-0.example.com, broker-1.example.com, …)
  # must also resolve to the same LoadBalancer IP.
  # A wildcard DNS record  *.example.com → <LB IP>  covers both this and bootstrapHost.
  brokerAddressPattern: "broker-$(nodeId).example.com"

  tls:
    # Name of an existing Secret containing the downstream mTLS material.
    # The proxy presents this certificate to clients.
    # The certificate must have SANs covering bootstrapHost and all broker hostnames.
    secretName: kroxylicious-downstream-tls
    keyFile:  tls.key   # private key PEM
    certFile: tls.crt   # certificate PEM

# ── Authorization filter (optional) ──────────────────────────────────────────
authorization:
  enabled: false
  # ACL rules evaluated before the request reaches the Kafka broker.
  # User principal is derived from the TLS client certificate subject.
  # Rule format:  allow|deny  User with name = "…"  to <OP>  Topic with name …;
  # File must end with:  otherwise deny;
  rules: |
    from io.kroxylicious.filter.authorization import TopicResource as Topic;

    # allow User with name = "CN=my-app,O=Org,C=IL" to READ Topic with name like "events-*";

    otherwise deny;

# ── CA bundle init container ──────────────────────────────────────────────────
# An init container downloads a CA bundle before Kroxylicious starts and places
# it at /ca-bundle/ca.crt. The bundle is used as the trust anchor for both
# upstream (Kafka broker) and downstream (client) TLS verification.
caBundle:
  url: ""                     # e.g. https://pki.internal/ca-chain.pem
  certPath: /ca-bundle/ca.crt # where the init container places the bundle inside the pod
  insecureSkipVerify: false   # set true if the download server uses a self-signed cert
  extraArgs: []               # extra wget flags, e.g. ["--header=Authorization: Bearer tok"]
  image:
    repository: busybox
    tag: stable               # includes TLS-capable wget; use alpine if wget fails on HTTPS
    pullPolicy: Always

# ── Management Service (ClusterIP, internal only) ────────────────────────────
# Enable to create a separate ClusterIP Service for the management port.
# Useful for Prometheus ServiceMonitor scraping — keeps port 9190 off the
# public LoadBalancer.
managementService:
  enabled: false
  # Annotations for Prometheus Operator auto-discovery, e.g.:
  #   prometheus.io/scrape: "true"
  #   prometheus.io/port: "9190"
  #   prometheus.io/path: "/metrics"
  annotations: {}

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: LoadBalancer
  # Cloud/on-prem specific annotations, e.g.:
  #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  #   metallb.universe.tf/address-pool: default
  annotations: {}
  # loadBalancerIP: ""   # uncomment to request a specific IP

# ── Management API ────────────────────────────────────────────────────────────
# Kroxylicious exposes an HTTP management server used for health probes and
# Prometheus metrics (/metrics).  Default port is 9190.
management:
  port: 9190
  bindAddress: "0.0.0.0"

# ── Health probes ─────────────────────────────────────────────────────────────
# All probes hit GET /livez on the management port.
# startup probe fires first; liveness/readiness only kick in once it passes.
probes:
  startup:
    enabled: true
    periodSeconds: 10
    failureThreshold: 30   # up to 5 min to become healthy before pod is killed
    timeoutSeconds: 5
  liveness:
    enabled: true
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    enabled: true
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

# ── Compute resources ─────────────────────────────────────────────────────────
resources: {}
#  requests:
#    cpu: 250m
#    memory: 256Mi
#  limits:
#    cpu: 1000m
#    memory: 512Mi

# ── Rolling update strategy ───────────────────────────────────────────────────
# Percentages scale automatically with replicaCount — no need to adjust these
# when changing the replica count.
# 25% rounds down for maxUnavailable (conservative) and up for maxSurge, which
# also handles replicaCount: 1 correctly (0 unavailable, 1 surge).
rollingUpdate:
  maxUnavailable: "25%"
  maxSurge: "25%"

# ── Pod Disruption Budget ─────────────────────────────────────────────────────
# maxUnavailable: 1 means "never evict more than 1 pod at a time", which stays
# consistent with the rolling update budget at any replica count.
# Only meaningful when replicaCount > 1.
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

# ── Topology spread constraints ───────────────────────────────────────────────
# Spreads pods across nodes (and optionally zones) to survive node failures.
# The labelSelector is injected automatically — no need to specify it here.
# Remove or set to [] to disable.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway   # soft: won't block scheduling if nodes are full
  # Also spread across availability zones:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
